# ──────────────────────────────────────────────
#  snap.cfg  —  konfiguracja snap.py
# ──────────────────────────────────────────────

[performance]

# Liczba równoległych workerów (kart przeglądarki).
# Zalecenia sprzętowe:
#   4 GB  RAM  →  workers = 1
#   8 GB  RAM  →  workers = 2-3   (OptiPlex 790 / podobne)
#   16 GB RAM  →  workers = 4-6
#   32 GB RAM  →  workers = 8+
workers = 3


[browser]

# Rozdzielczość wirtualnego okna przeglądarki
viewport_width  = 1440
viewport_height = 900

# Maksymalna wysokość screenshota w pikselach (zabezpieczenie przed bardzo długimi LP)
max_screenshot_height = 15000


[crawl]

# Maksymalna liczba podstron wykrytych automatycznie w trybie crawl
max_pages = 9999
